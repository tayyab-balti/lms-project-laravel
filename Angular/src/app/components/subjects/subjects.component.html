<app-header></app-header>
<div class="subjects-container">
  <!-- Header -->
  <div class="subjects-header">
    <h2 class="subjects-title">Select a Subject</h2>
    <button
      class="add-btn"
      *ngIf="!showForm && !editingSubject"
      (click)="showForm = true"
    >
      + Add Subject
    </button>
  </div>

  <!-- Add or Edit Subject Form -->
  <div class="subject-form" *ngIf="showForm || editingSubject">
    <h3 class="form-title">
      {{ editingSubject ? "Edit Subject" : "New Subject" }}
    </h3>

    <label class="form-label">Title</label>
    <input placeholder="Title" [(ngModel)]="currentSubject.title" />

    <label class="form-label">Image</label>
    <input
      type="file"
      class="file-input"
      (change)="onFileChange($event)"
      accept="image/*"
    />

    <label class="form-label">Description</label>
    <textarea
      placeholder="Description"
      [(ngModel)]="currentSubject.description"
    ></textarea>

    <div class="form-actions">
      <button
        class="save-btn"
        (click)="editingSubject ? onUpdateSubject() : onAddSubject()"
      >
        {{ editingSubject ? "Update Subject" : "Save Subject" }}
      </button>
      <button class="cancel-btn" (click)="onCancel()">Cancel</button>
    </div>
  </div>

  <!-- Edit Subject Form
<div class="subject-form" *ngIf="editingSubject">
  <h3 class="form-title">Edit Subject</h3>

  <label class="form-label">Title</label>
  <input placeholder="Title *" [(ngModel)]="editingSubject.title" />

  <label class="form-label">Image</label>
  <input type="file" class="file-input" (change)="onFileChange($event)" accept="image/*" />

  <label class="form-label">Description</label>
  <textarea placeholder="Description" [(ngModel)]="editingSubject.description"></textarea>

  <div class="form-actions">
    <button class="save-btn" (click)="onUpdateSubject()">Update Subject</button>
    <button class="cancel-btn" (click)="onCancelEdit()">Cancel</button>
  </div>
</div> -->

  <!-- Subject Grid (hidden while editing) -->
  <div class="subjects-grid" *ngIf="!showForm && !editingSubject">
    <div
      class="subject-card"
      *ngFor="let subject of subjects"
      (click)="onSelectSubject(subject.id)"
    >
      <img
        [src]="'http://localhost:3500/' + subject.imageFile"
        [alt]="subject.title"
        class="subject-image"
      />
      <div class="card-body">
        <span class="subject-name">{{ subject.title }}</span>
        <p class="subject-description">{{ subject.description }}</p>
        <!-- Three Dots Menu -->
        <div class="menu-container" (click)="$event.stopPropagation()">
          <button class="menu-btn" (click)="toggleMenu($event, subject.id)">
            <!-- three dots icon -->
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="5" r="1"></circle>
              <circle cx="12" cy="12" r="1"></circle>
              <circle cx="12" cy="19" r="1"></circle>
            </svg>
          </button>

          <!-- Menu Options -->
          <div class="menu-options" *ngIf="openMenuId === subject.id">
            <button class="edit-btn" (click)="onEditSubject($event, subject)">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M12 20h9"></path>
                <path
                  d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"
                ></path>
              </svg>
              Edit
            </button>
            <button class="delete-btn" (click)="onDeleteClick($event, subject)">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polyline points="3 6 5 6 21 6"></polyline>
                <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path>
                <path d="M10 11v6"></path>
                <path d="M14 11v6"></path>
              </svg>
              Delete
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Delete Confirmation Popup -->
    <div class="popup-overlay" *ngIf="showDeletePopup">
      <div class="popup-box">
        <div class="popup-icon">⚠️</div>
        <h3>Delete Subject?</h3>
        <p>
          You are about to delete
          <strong style="color: #eef0f7">{{ subjectToDelete?.title }}</strong
          >. This action cannot be undone.
        </p>
        <div class="popup-actions">
          <button class="popup-cancel" (click)="onCancelDelete()">
            Cancel
          </button>
          <button class="popup-confirm" (click)="onConfirmDelete()">
            Yes, Delete
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
